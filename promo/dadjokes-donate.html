<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }

  body {
    position: relative;
    background-color: #17140F;
    background-image:
      radial-gradient(120% 90% at 50% 22%, transparent 38%, #0C0A07 100%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.05'/></svg>");
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Marker Felt", "Chalkboard SE", sans-serif;
  }

  .stack { position: relative; width: 680px; height: 680px; }

  .note {
    position: absolute;
    inset: 0;
    border-radius: 4px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
  }
  .peek-blue { background: #7FD1EF; transform: rotate(5deg) translate(26px, 14px); }
  .peek-pink { background: #F98CC0; transform: rotate(-6deg) translate(-30px, 22px); }

  .main {
    background: #FBE94F;
    transform: rotate(-2.5deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    overflow: hidden;
  }
  .main::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 24%;
    background: linear-gradient(rgba(0,0,0,0.05), rgba(0,0,0,0));
  }

  .eyebrow {
    font-family: -apple-system, sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #7c7256;
    margin-bottom: 26px;
  }

  .title {
    font-size: 118px;
    line-height: 1;
    color: #2B2724;
    letter-spacing: -0.01em;
  }

  .rule {
    width: 340px;
    height: 9px;
    background: #C0392B;
    border-radius: 6px;
    transform: rotate(-1.4deg);
    margin: 26px 0 30px;
  }

  .sub {
    font-size: 44px;
    color: #C0392B;
    display: flex;
    align-items: center;
    gap: 14px;
    transform: rotate(-0.6deg);
  }
  .cup { font-family: "Apple Color Emoji"; font-size: 40px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="note peek-blue"></div>
    <div class="note peek-pink"></div>
    <div class="note main">
      <div class="eyebrow">A dad joke a day &middot; free</div>
      <div class="title">dadjokes.wtf</div>
      <div class="rule"></div>
      <div class="sub">buy the jokes a coffee <span class="cup">&#9749;</span></div>
    </div>
  </div>
</body>
</html>
