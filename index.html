<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sticky Jokes</title>
<meta name="description" content="A stack of dad jokes on sticky notes.">

<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" href="./icons/icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sticky Jokes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#B5A48B" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#17140F" media="(prefers-color-scheme: dark)">

<style>
  :root {
    --desk: #B5A48B;
    --desk-deep: #9C8A6F;
    --chrome-fg: #2F2920;
    --chrome-muted: #635842;
    --chrome-line: rgba(47, 41, 32, 0.22);
    --accent: #C0392B;

    /* one ink for every note colour - a ballpoint doesn't change to match the paper */
    --ink: #2B2724;
    --note-shadow: rgba(60, 46, 26, 0.34);
    --note-dim: 1;

    --hand: "Marker Felt", "Bradley Hand", "Chalkboard SE", "Comic Sans MS", cursive;
    --ui: ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --desk: #17140F;
      --desk-deep: #0C0A07;
      --chrome-fg: #E9E0CB;
      --chrome-muted: #948871;
      --chrome-line: rgba(233, 224, 203, 0.20);
      --note-shadow: rgba(0, 0, 0, 0.62);
      --note-dim: 0.86;
    }
  }

  :root[data-theme="dark"] {
    --desk: #17140F;
    --desk-deep: #0C0A07;
    --chrome-fg: #E9E0CB;
    --chrome-muted: #948871;
    --chrome-line: rgba(233, 224, 203, 0.20);
    --note-shadow: rgba(0, 0, 0, 0.62);
    --note-dim: 0.86;
  }

  :root[data-theme="light"] {
    --desk: #B5A48B;
    --desk-deep: #9C8A6F;
    --chrome-fg: #2F2920;
    --chrome-muted: #635842;
    --chrome-line: rgba(47, 41, 32, 0.22);
    --note-shadow: rgba(60, 46, 26, 0.34);
    --note-dim: 1;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding:
      calc(22px + env(safe-area-inset-top, 0px))
      calc(16px + env(safe-area-inset-right, 0px))
      calc(18px + env(safe-area-inset-bottom, 0px))
      calc(16px + env(safe-area-inset-left, 0px));
    background-color: var(--desk);
    background-image:
      radial-gradient(120% 90% at 50% 0%, transparent 40%, var(--desk-deep) 100%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.055'/></svg>");
    color: var(--chrome-fg);
    font-family: var(--ui);
    overflow: hidden;
    touch-action: pan-y;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- chrome ---------- */

  header, footer {
    flex: none;
    display: flex;
    align-items: baseline;
    gap: 14px;
    width: min(92vw, 420px);
  }

  header {
    padding-bottom: 12px;
    border-bottom: 1px solid var(--chrome-line);
  }

  footer {
    align-items: center;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--chrome-line);
  }

  h1 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .count {
    margin-left: auto;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--chrome-muted);
    font-variant-numeric: tabular-nums;
  }

  .hint {
    margin-left: auto;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--chrome-muted);
    opacity: 0.8;
    text-align: right;
  }

  /* the hint is the first thing to go when the footer gets tight */
  @media (max-width: 400px) {
    .hint { display: none; }
  }

  /* ---------- stage: arrow, stack, arrow ---------- */

  .stage {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .stack {
    position: relative;
    /* the note is square, so it has to respect the shorter axis too, or a
       short viewport clips it and pushes the footer off screen */
    width: min(84vw, 360px, 58vh);
    aspect-ratio: 1 / 1;
  }

  .nav {
    flex: none;
    width: 46px;
    height: 46px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    border: 1px solid var(--chrome-line);
    background: transparent;
    color: var(--chrome-fg);
    cursor: pointer;
    transition: background 140ms ease, border-color 140ms ease, opacity 140ms ease;
  }

  .nav:hover:not(:disabled) { background: rgba(128, 128, 128, 0.16); border-color: var(--chrome-fg); }
  .nav:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .nav:disabled { opacity: 0.25; cursor: default; }

  /* Touch devices have the swipe, so the arrows are dead weight there. */
  @media (hover: none) and (pointer: coarse) {
    .nav { display: none; }
  }

  /* ---------- the notes ---------- */

  .note {
    position: absolute;
    inset: 0;
    background: var(--paper);
    filter: brightness(var(--note-dim));
    /* square, barely-there corners: a sticky note is cut, not rounded */
    border-radius: 2px;
    box-shadow:
      0 1px 1px rgba(0, 0, 0, 0.10),
      0 14px 26px -12px var(--note-shadow);
    /* the note is the sizing context for its own handwriting, so the type
       scales with the paper instead of overflowing it on small screens */
    container-type: size;
    /* percentages, not cqw: an element's own padding resolves against its
       ancestor container, which would blow the padding out and crush the note */
    padding: 9.5% 8% 8%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    will-change: transform;
    transition: transform 260ms cubic-bezier(.2, .7, .3, 1), opacity 260ms ease;
  }

  /* the adhesive strip across the top reads slightly darker through the paper */
  .note::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 26%;
    pointer-events: none;
    background: linear-gradient(rgba(0, 0, 0, 0.055), rgba(0, 0, 0, 0));
    z-index: 3;
  }

  .note > * { position: relative; z-index: 1; }

  .note.behind { pointer-events: none; }
  .note.live { cursor: grab; }
  .note.live.dragging { cursor: grabbing; transition: none; }

  .setup {
    margin: 0;
    font-family: var(--hand);
    font-size: 7.2cqw;
    line-height: 1.32;
    color: var(--ink);
    opacity: 0.82;
    text-wrap: balance;
  }

  /* ---------- peel to reveal ---------- */

  .reveal {
    position: relative;
    margin-top: 5.2cqw;
    min-height: 26cqw;
    display: flex;
    align-items: center;
    /* the flap is a sheet of paper hinging away from the viewer */
    perspective: 700px;
  }

  /* the punchline is the point of the note, so it lands bigger and fully inked */
  .punchline {
    margin: 0;
    font-family: var(--hand);
    font-size: 8.5cqw;
    line-height: 1.26;
    color: var(--ink);
    text-wrap: balance;
  }

  .flap {
    position: absolute;
    /* overhang the text slightly so no ascenders peek out from under it */
    inset: -2cqw -1.5cqw;
    margin: 0;
    padding: 0;
    border: 0;
    border-radius: 1px;
    font-family: var(--ui);
    color: var(--ink);
    cursor: pointer;
    display: grid;
    place-items: center;
    /* same stock as the note, with the shading a lifted sheet would carry */
    background-color: var(--paper);
    background-image: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.075),
      rgba(0, 0, 0, 0.012) 38%,
      rgba(255, 255, 255, 0.10)
    );
    box-shadow: 0 5px 9px -6px rgba(0, 0, 0, 0.5);
    transform-origin: top center;
    transform: rotateX(0deg);
    opacity: 1;
    z-index: 2;
    -webkit-tap-highlight-color: transparent;
    transition: transform 520ms cubic-bezier(.2, .7, .25, 1),
                opacity 520ms cubic-bezier(.2, .7, .25, 1);
  }

  /* while a finger is on it, the flap tracks the finger with no easing */
  .flap.instant { transition: none; }

  .flap:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* perforation along the hinge, so it reads as something you tear open */
  .flap::before {
    content: "";
    position: absolute;
    top: 2cqw;
    left: 1.5cqw;
    right: 1.5cqw;
    border-top: 1.5px dashed rgba(0, 0, 0, 0.28);
  }

  /* dog-eared corner: the bit you'd actually pinch */
  .flap::after {
    content: "";
    position: absolute;
    right: 0;
    bottom: 0;
    border-width: 0 0 3.6cqw 3.6cqw;
    border-style: solid;
    border-color: transparent transparent rgba(0, 0, 0, 0.16) transparent;
  }

  .flap-label {
    font-size: 2.9cqw;
    letter-spacing: 0.17em;
    text-transform: uppercase;
    opacity: 0.55;
    padding-top: 1.5cqw;
    pointer-events: none;
  }

  /* longer jokes step down a size rather than overflowing the square */
  .note.long .setup { font-size: 6cqw; }
  .note.long .punchline { font-size: 7cqw; }
  .note.long .reveal { margin-top: 4.2cqw; min-height: 22cqw; }
  .note.xlong .setup { font-size: 5.1cqw; line-height: 1.3; }
  .note.xlong .punchline { font-size: 5.9cqw; }
  .note.xlong .reveal { margin-top: 3.5cqw; min-height: 18cqw; }

  .note .no {
    position: absolute;
    top: 12px;
    right: 16px;
    font-family: var(--ui);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink);
    opacity: 0.36;
    font-variant-numeric: tabular-nums;
    z-index: 4;
  }

  /* ---------- end of stack ---------- */

  .done {
    text-align: center;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }

  .done h2 {
    margin: 0;
    font-family: var(--hand);
    font-size: 9cqw;
    font-weight: normal;
    color: var(--ink);
  }

  /* ---------- buttons ---------- */

  .btn {
    font-family: var(--ui);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--chrome-fg);
    background: transparent;
    border: 1px solid var(--chrome-line);
    border-radius: 3px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 140ms ease, border-color 140ms ease;
  }

  .btn:hover { background: rgba(128, 128, 128, 0.14); border-color: var(--chrome-fg); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .done .btn {
    color: var(--ink);
    border-color: rgba(0, 0, 0, 0.30);
  }

  .done .btn:hover { background: rgba(0, 0, 0, 0.07); border-color: var(--ink); }

  /* ---------- toast ---------- */

  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(84px + env(safe-area-inset-bottom, 0px));
    transform: translate(-50%, 8px);
    padding: 10px 16px;
    border-radius: 4px;
    background: var(--ink);
    color: #F6F1E4;
    font-size: 12px;
    letter-spacing: 0.08em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease, transform 200ms ease;
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* ---------- installed-app touch behaviour ---------- */

  .note {
    /* claim the horizontal gesture so iOS doesn't treat a swipe as a scroll */
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  button {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  @media (prefers-reduced-motion: reduce) {
    .note, .flap { transition-duration: 1ms; }
  }
</style>
</head>
<body>

<header>
  <h1>Sticky Jokes</h1>
  <span class="count" id="count"></span>
</header>

<div class="stage">
  <button class="nav" id="prevBtn" aria-label="Previous joke">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
         stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="15 18 9 12 15 6" />
    </svg>
  </button>

  <div class="stack" id="stack"></div>

  <button class="nav" id="nextBtn" aria-label="Next joke">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
         stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="9 18 15 12 9 6" />
    </svg>
  </button>
</div>

<footer>
  <button class="btn" id="shuffleBtn">Shuffle</button>
  <button class="btn" id="shareBtn">Share</button>
  <span class="hint">Peel for the punchline</span>
</footer>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  /* Jokes carry a permanent `id`. Share links point at the id, so it must never
     be reused or renumbered - add new jokes with the next number up, and don't
     renumber if one is removed. Order in this array doesn't matter. */
  const JOKES = [
    { id: 1,  s: "I'm afraid for the calendar.", p: "Its days are numbered." },
    { id: 2,  s: "Why do fathers take an extra pair of socks when they golf?", p: "In case they get a hole in one." },
    { id: 3,  s: "What do you call a fake noodle?", p: "An impasta." },
    { id: 4,  s: "I only know 25 letters of the alphabet.", p: "I don't know y." },
    { id: 5,  s: "What did the ocean say to the beach?", p: "Nothing, it just waved." },
    { id: 6,  s: "Why don't skeletons fight each other?", p: "They don't have the guts." },
    { id: 7,  s: "I used to hate facial hair.", p: "But then it grew on me." },
    { id: 8,  s: "What do you call a factory that makes okay products?", p: "A satisfactory." },
    { id: 9,  s: "Why did the scarecrow win an award?", p: "He was outstanding in his field." },
    { id: 10, s: "I would avoid the sushi if I were you.", p: "It's a little fishy." },
    { id: 11, s: "What's the best thing about Switzerland?", p: "I don't know, but the flag is a big plus." },
    { id: 12, s: "Did you hear about the guy who invented Lifesavers?", p: "They say he made a mint." },
    { id: 13, s: "Why can't you hear a pterodactyl in the bathroom?", p: "Because the P is silent." },
    { id: 14, s: "What do you call a belt made of watches?", p: "A waist of time." },
    { id: 15, s: "How do you follow Will Smith in the snow?", p: "You follow the fresh prints." },
    { id: 16, s: "What did one wall say to the other wall?", p: "I'll meet you at the corner." },
    { id: 17, s: "Why don't eggs tell jokes?", p: "They'd crack each other up." },
    { id: 18, s: "I told my wife she was drawing her eyebrows too high.", p: "She looked surprised." },
    { id: 19, s: "What do you call cheese that isn't yours?", p: "Nacho cheese." },
    { id: 20, s: "Why did the coffee file a police report?", p: "It got mugged." },
    { id: 21, s: "What's brown and sticky?", p: "A stick." },
    { id: 22, s: "How does a penguin build its house?", p: "Igloos it together." },
    { id: 23, s: "Why did the bicycle fall over?", p: "It was two tired." },
    { id: 24, s: "What do you call a dinosaur with an extensive vocabulary?", p: "A thesaurus." },
    { id: 25, s: "I don't trust stairs.", p: "They're always up to something." },
    { id: 26, s: "What did the janitor say when he jumped out of the closet?", p: "Supplies!" },
    { id: 27, s: "Why do melons have weddings?", p: "Because they cantaloupe." },
    { id: 28, s: "What's the difference between a poorly dressed man on a unicycle and a well dressed man on a bicycle?", p: "Attire." },
    { id: 29, s: "How do you make holy water?", p: "You boil the hell out of it." },
    { id: 30, s: "What did the buffalo say when his son left for college?", p: "Bison." },
    { id: 31, s: "Why don't scientists trust atoms?", p: "Because they make up everything." },
    { id: 32, s: "I bought some shoes from a drug dealer.", p: "I don't know what he laced them with, but I've been tripping all day." },
    { id: 33, s: "What do you call a pile of cats?", p: "A meowtain." },
    { id: 34, s: "Why did the golfer bring two pairs of pants?", p: "In case he got a hole in one." },
    { id: 35, s: "What's orange and sounds like a parrot?", p: "A carrot." },
    { id: 36, s: "I'm reading a book about anti-gravity.", p: "It's impossible to put down." },
    { id: 37, s: "Did you hear about the restaurant on the moon?", p: "Great food, no atmosphere." },
    { id: 38, s: "What do you call a bear with no teeth?", p: "A gummy bear." },
    { id: 39, s: "Why was the math book sad?", p: "It had too many problems." },
    { id: 40, s: "How do you organize a space party?", p: "You planet." },
    { id: 41, s: "What do you call a boomerang that doesn't come back?", p: "A stick." },
    { id: 42, s: "Why did the man fall down the well?", p: "He couldn't see that well." },
    { id: 43, s: "I'm on a seafood diet.", p: "I see food and I eat it." },
    { id: 44, s: "What did the grape do when it got stepped on?", p: "Nothing, it just let out a little wine." },
    { id: 45, s: "Why do bees have sticky hair?", p: "Because they use honeycombs." },
    { id: 46, s: "What did the zero say to the eight?", p: "Nice belt." },
    { id: 47, s: "Dad, can you put my shoes on?", p: "I don't think they'll fit me." },
    { id: 48, s: "Why did the golfer change his socks?", p: "There was a hole in one." },
    { id: 49, s: "What's a pirate's favorite letter?", p: "You'd think it's R, but his first love be the C." },
    { id: 50, s: "I made a pencil with two erasers.", p: "It was pointless." }
  ];

  /* Sticky-note stock, cycled by position so no two neighbours match. */
  const PAPERS = ["#FBE94F", "#7FD1EF", "#F98CC0", "#A9E27F", "#FDB35C", "#C6A4EE"];

  /* Fixed tilts, indexed by position, so a note never jumps on re-render. */
  const TILTS = [-2.4, 1.9, -1.1, 2.3, -0.7, 1.4];

  const PEEL_DEG = 168;      // how far the flap swings open
  const PEEL_TRAVEL = 110;   // px of finger travel for a full peel
  const SWIPE_MIN = 95;      // px before a horizontal drag counts as a swipe
  const AXIS_LOCK = 8;       // px before we decide peel-vs-navigate

  const stack = document.getElementById('stack');
  const countEl = document.getElementById('count');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const shareBtn = document.getElementById('shareBtn');
  const toastEl = document.getElementById('toast');

  let deck = [];
  let index = 0;
  let suppressClick = false;   // a drag shouldn't also fire the flap's click

  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

  const shuffle = (a) => {
    const out = a.slice();
    for (let i = out.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
  };

  const escapeHtml = (s) =>
    s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  const paperFor = (position) => PAPERS[(position - 1) % PAPERS.length];
  const tiltFor = (position) => TILTS[(position - 1) % TILTS.length];

  let toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  /* ---------- notes ---------- */

  function buildNote(joke, depth, position) {
    const el = document.createElement('article');
    const len = joke.s.length + joke.p.length;
    const size = len > 150 ? ' xlong' : len > 95 ? ' long' : '';

    el.className = 'note ' + (depth === 0 ? 'live' : 'behind') + size;
    el.style.setProperty('--paper', paperFor(position));

    const tilt = tiltFor(position);
    el.style.transform =
      `translateY(${depth * 8}px) scale(${1 - depth * 0.04}) rotate(${tilt}deg)`;
    el.style.zIndex = String(10 - depth);
    el.dataset.tilt = String(tilt);

    el.innerHTML = `
      <span class="no">${position}</span>
      <p class="setup">${escapeHtml(joke.s)}</p>
      <div class="reveal">
        <p class="punchline">${escapeHtml(joke.p)}</p>
        <button class="flap" type="button" aria-expanded="false"
                aria-label="Peel to reveal the punchline">
          <span class="flap-label">Peel</span>
        </button>
      </div>
    `;
    return el;
  }

  function buildDoneNote() {
    const el = document.createElement('article');
    el.className = 'note behind done';
    el.style.setProperty('--paper', paperFor(deck.length + 1));
    el.style.transform = 'rotate(-1.4deg)';
    el.style.zIndex = '10';
    el.innerHTML = `
      <h2>That's the whole stack.</h2>
      <button class="btn" type="button" data-shuffle>Shuffle</button>
    `;
    return el;
  }

  /* p runs 0 (shut) to 1 (fully peeled) */
  function setPeel(note, p, animate) {
    const flap = note && note.querySelector('.flap');
    if (!flap) return;
    flap.classList.toggle('instant', !animate);
    flap.style.transform = `rotateX(${(-PEEL_DEG * p).toFixed(2)}deg)`;
    flap.style.opacity = String(clamp((1 - p) * 3.5, 0, 1));

    const open = p >= 1;
    note.classList.toggle('peeled', open);
    flap.setAttribute('aria-expanded', open ? 'true' : 'false');
    // once open, the flap must not sit in front of the punchline
    flap.style.pointerEvents = open ? 'none' : '';
  }

  const isPeeled = (note) => note.classList.contains('peeled');

  function togglePeel(note) {
    setPeel(note, isPeeled(note) ? 0 : 1, true);
  }

  function render() {
    stack.querySelectorAll('.note:not(.flung)').forEach((n) => n.remove());

    if (index >= deck.length) {
      stack.appendChild(buildDoneNote());
      countEl.textContent = 'All out';
    } else {
      for (let depth = 2; depth >= 0; depth--) {
        const i = index + depth;
        if (i >= deck.length) continue;
        stack.appendChild(buildNote(deck[i], depth, i + 1));
      }
      countEl.textContent = `${index + 1} / ${deck.length}`;
      attachDrag(stack.querySelector('.note.live'));
    }

    prevBtn.disabled = index <= 0;
    nextBtn.disabled = index >= deck.length;
    shareBtn.disabled = index >= deck.length;
  }

  const topNote = () => stack.querySelector('.note.live');

  /* dir: +1 forward, -1 back. The note exits the way you sent it, and the
     note for the new index is revealed underneath. */
  function go(dir) {
    const target = index + dir;
    if (target < 0 || target > deck.length) return;

    const note = topNote();
    if (note) {
      note.classList.remove('live', 'dragging');
      note.classList.add('flung');
      note.style.zIndex = '50';
      note.style.transition = 'transform 380ms cubic-bezier(.4,0,.6,1), opacity 380ms ease';
      note.style.transform =
        `translate(${dir * (window.innerWidth + 240)}px, 40px) rotate(${dir * 22}deg)`;
      note.style.opacity = '0';
      setTimeout(() => note.remove(), 400);
    }

    index = target;
    render();
  }

  /* ---------- gestures ----------
     One pointer stream serves two gestures, so the first few pixels decide
     which: mostly sideways is navigation, mostly vertical on the flap is a
     peel. Whichever wins keeps the gesture until the finger lifts. */
  function attachDrag(note) {
    if (!note) return;

    const tilt = Number(note.dataset.tilt) || 0;
    const flap = note.querySelector('.flap');
    let startX = 0, startY = 0, dx = 0, dy = 0;
    let dragging = false, pointerId = null, axis = null, onFlap = false;

    const onDown = (e) => {
      pointerId = e.pointerId;
      startX = e.clientX;
      startY = e.clientY;
      dx = dy = 0;
      axis = null;
      onFlap = !!(flap && !isPeeled(note) && e.target.closest('.flap'));
      dragging = true;
      note.classList.add('dragging');
      note.setPointerCapture(pointerId);
    };

    const onMove = (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      dx = e.clientX - startX;
      dy = e.clientY - startY;

      if (axis === null && (Math.abs(dx) > AXIS_LOCK || Math.abs(dy) > AXIS_LOCK)) {
        if (Math.abs(dx) >= Math.abs(dy)) axis = 'h';
        else axis = onFlap ? 'v' : 'h';
      }

      if (axis === 'h') {
        // there's nothing before the first note, so dragging back just resists
        const damped = (dx < 0 && index === 0) ? dx * 0.25 : dx;
        note.style.transform =
          `translate(${damped}px, ${dy * 0.35}px) rotate(${tilt + damped * 0.055}deg)`;
      } else if (axis === 'v') {
        setPeel(note, clamp(-dy / PEEL_TRAVEL, 0, 1), false);
      }
    };

    const onUp = (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      dragging = false;
      note.classList.remove('dragging');

      if (axis === 'v') {
        suppressClick = true;
        setPeel(note, (-dy / PEEL_TRAVEL) > 0.4 ? 1 : 0, true);
        return;
      }

      if (axis === 'h') {
        suppressClick = true;
        note.style.transform = `rotate(${tilt}deg)`;
        if (Math.abs(dx) > SWIPE_MIN) {
          const dir = dx > 0 ? 1 : -1;
          if (!(dir === -1 && index === 0)) go(dir);
        }
        return;
      }

      // Never moved: a tap. Handled here rather than in the click listener
      // because pointer capture retargets the click to the note, so the
      // listener can't tell the flap was what got tapped.
      if (axis === null && onFlap) {
        suppressClick = true;
        togglePeel(note);
      }
    };

    note.addEventListener('pointerdown', onDown);
    note.addEventListener('pointermove', onMove);
    note.addEventListener('pointerup', onUp);
    note.addEventListener('pointercancel', onUp);
  }

  /* ---------- sharing ---------- */

  const currentJoke = () => (index < deck.length ? deck[index] : null);

  function linkFor(joke) {
    const url = new URL(window.location.href);
    url.hash = '';
    url.search = '?j=' + joke.id;
    return url.toString();
  }

  async function shareCurrent() {
    const joke = currentJoke();
    if (!joke) return;

    const link = linkFor(joke);
    const text = joke.s + '\n' + joke.p;

    if (navigator.share) {
      try {
        await navigator.share({ title: 'Sticky Jokes', text, url: link });
        return;
      } catch (err) {
        // the user backing out of the share sheet is not a failure
        if (err && err.name === 'AbortError') return;
      }
    }

    try {
      await navigator.clipboard.writeText(text + '\n' + link);
      toast('Joke copied to clipboard');
    } catch (err) {
      toast('Could not share on this browser');
    }
  }

  /* ---------- start ---------- */

  function start(targetId) {
    deck = shuffle(JOKES);

    // a shared link opens on its joke, with the rest of the stack behind it
    if (targetId) {
      const at = deck.findIndex((j) => j.id === targetId);
      if (at > 0) deck.unshift(deck.splice(at, 1)[0]);
    }

    index = 0;
    stack.querySelectorAll('.note').forEach((n) => n.remove());
    render();
  }

  function sharedId() {
    const raw = new URLSearchParams(window.location.search).get('j');
    // digits only: parseInt would read "1e3" as 1 and open a joke nobody linked
    if (!raw || !/^\d+$/.test(raw)) return null;
    const id = Number.parseInt(raw, 10);
    return JOKES.some((j) => j.id === id) ? id : null;
  }

  prevBtn.addEventListener('click', () => go(-1));
  nextBtn.addEventListener('click', () => go(1));
  shareBtn.addEventListener('click', shareCurrent);

  shuffleBtn.addEventListener('click', () => {
    // dropping ?j stops a refresh from snapping back to the shared joke
    history.replaceState(null, '', window.location.pathname);
    start(null);
  });

  stack.addEventListener('click', (e) => {
    if (suppressClick) { suppressClick = false; return; }
    if (e.target.closest('[data-shuffle]')) {
      history.replaceState(null, '', window.location.pathname);
      start(null);
      return;
    }
    const flap = e.target.closest('.flap');
    if (flap) {
      const note = flap.closest('.note');
      if (note && note.classList.contains('live')) togglePeel(note);
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
    else if (e.key === ' ' || e.key === 'Enter') {
      // space peels, unless focus is on a control that wants the key itself
      if (e.target && e.target.closest('button')) return;
      const note = topNote();
      if (note) { e.preventDefault(); togglePeel(note); }
    }
  });

  start(sharedId());
</script>

<script>
  // Offline support. Registration failing is not fatal - the app still runs.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
